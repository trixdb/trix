# =============================================================================
# Trix Local Development Stack
# =============================================================================
# Usage:
#   ./scripts/local-setup.sh              # First-time setup (generates .env.local)
#   docker compose up -d                  # Start infrastructure + all services
#   docker compose up -d infra            # Start only databases/storage
#   docker compose --profile ml up -d     # Include Python ML workers
#   docker compose --profile visual up -d # Include visual embeddings
#   docker compose logs -f api            # Tail API logs
#   docker compose down                   # Stop all services
#   docker compose down -v                # Stop + delete all data
#
# Container naming: All containers use "trix-local-*" prefix to avoid
# clashes with the per-submodule docker-compose files (which use "trix-*").
#
# Port scheme: All host ports use 1xxxx to avoid clashes with local services.
#   PostgreSQL:     15432    MinIO API:      19000    API:       13737
#   Valkey/Redis:   16379    MinIO Console:  19001    Workers:   19091
#   Memgraph Bolt:  17687    Visual Embed:   18090    Bots:      13739
#   Memgraph Mon:   17444    ML Workers:     19090
#
# Environment: .env.local (shared by all services via env_file)
#   - API keys, secrets, and optional port overrides
#   - DB/Redis/S3 URLs are set per-service in this file (not in .env.local)
#   - Generate with: ./scripts/local-setup.sh [--railway]
# =============================================================================

services:
  # ===========================================================================
  # Infrastructure
  # ===========================================================================

  postgres:
    image: pgvector/pgvector:pg17
    container_name: trix-local-postgres
    environment:
      POSTGRES_USER: trix
      POSTGRES_PASSWORD: Tr1x_L0cal_S3cret!
      POSTGRES_DB: trix
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    ports:
      - "${TRIX_PORT_POSTGRES:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./trix-api/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - trix
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trix -d trix"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    container_name: trix-local-valkey
    ports:
      - "${TRIX_PORT_VALKEY:-16379}:6379"
    volumes:
      - valkey_data:/data
    networks:
      - trix
    command: >
      valkey-server
      --appendonly yes
      --save 60 1000
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: trix-local-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "${TRIX_PORT_MINIO_API:-19000}:9000"
      - "${TRIX_PORT_MINIO_UI:-19001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - trix
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: trix-local-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - trix
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing minio/trix-audio;
      mc anonymous set download minio/trix-audio;
      exit 0;
      "

  memgraph:
    image: memgraph/memgraph:latest
    container_name: trix-local-memgraph
    ports:
      - "${TRIX_PORT_MEMGRAPH:-17687}:7687"
      - "${TRIX_PORT_MEMGRAPH_MON:-17444}:7444"
    environment:
      MEMGRAPH_LOG_LEVEL: ERROR
      MEMGRAPH_STORAGE_MODE: IN_MEMORY_ANALYTICAL
    volumes:
      - memgraph_data:/var/lib/memgraph
      - memgraph_log:/var/log/memgraph
    networks:
      - trix
    command: >
      --bolt-port=7687
      --log-level=ERROR
      --also-log-to-stderr=true
      --storage-snapshot-interval-sec=300
      --storage-wal-enabled=true
      --query-execution-timeout-sec=30
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host 127.0.0.1 --port 7687 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Dummy target so `docker compose up -d infra` works
  infra:
    image: busybox:latest
    container_name: trix-local-infra-ready
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      memgraph:
        condition: service_healthy
    command: ["echo", "Infrastructure ready"]

  # ===========================================================================
  # Application Services
  # ===========================================================================

  api:
    build:
      context: ./trix-api
      dockerfile: Dockerfile
      target: production
    container_name: trix-local-api
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3737
      DATABASE_URL: postgres://trix:Tr1x_L0cal_S3cret!@postgres:5432/trix
      REDIS_URL: redis://valkey:6379
      GRAPH_DB_TYPE: memgraph
      MEMGRAPH_HOST: memgraph
      MEMGRAPH_PORT: 7687
      GRAPH_SYNC_ENABLED: "true"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin123
      S3_BUCKET: trix-audio
      S3_REGION: auto
      S3_PUBLIC_URL: http://localhost:${TRIX_PORT_MINIO_API:-19000}/trix-audio
      AUTO_MIGRATE: "true"
      REQUIRE_INVITE_CODE: "false"
    ports:
      - "${TRIX_PORT_API:-13737}:3737"
    volumes:
      - api_uploads:/app/uploads
    networks:
      - trix
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      memgraph:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3737/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  workers:
    build:
      context: ./trix-workers-node
      dockerfile: Dockerfile
      target: production
    container_name: trix-local-workers-node
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://trix:Tr1x_L0cal_S3cret!@postgres:5432/trix
      GRAPH_DB_TYPE: memgraph
      GRAPH_HOST: memgraph
      GRAPH_PORT: 7687
      HEALTH_PORT: 9091
      HEALTH_HOST: 0.0.0.0
      LOG_LEVEL: info
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin123
      S3_BUCKET: trix-audio
      S3_REGION: auto
    ports:
      - "${TRIX_PORT_WORKERS:-19091}:9091"
    networks:
      - trix
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  bots:
    build:
      context: ./trix-bots
      dockerfile: Dockerfile
    container_name: trix-local-bots
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://trix:Tr1x_L0cal_S3cret!@postgres:5432/trix
      REDIS_URL: redis://valkey:6379
      TRIX_API_URL: http://api:3737
      TRIX_ALLOW_INSECURE: "true"
      PORT: 3739
      BOT_WORKER_CONCURRENCY: 5
      BOT_MAX_TURNS: 10
      BOT_EXECUTION_TIMEOUT_MS: 120000
    ports:
      - "${TRIX_PORT_BOTS:-13739}:3739"
    networks:
      - trix
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3739/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ===========================================================================
  # Optional Services (use --profile)
  # ===========================================================================

  # Python ML workers: docker compose --profile ml up -d
  ml-workers:
    build:
      context: ./trix-workers
      dockerfile: Dockerfile
      target: production
    container_name: trix-local-ml-workers
    env_file:
      - .env.local
    environment:
      TRIXDB_DATABASE_URL: postgresql://trix:Tr1x_L0cal_S3cret!@postgres:5432/trix
      REDIS_URL: redis://valkey:6379
      TRIXDB_LOG_LEVEL: INFO
      TRIXDB_METRICS_ENABLED: "true"
      TRIXDB_METRICS_PORT: 9090
    ports:
      - "${TRIX_PORT_ML_WORKERS:-19090}:9090"
    networks:
      - trix
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - ml

  # Visual embeddings: docker compose --profile visual up -d
  visual-embeddings:
    build:
      context: ./trix-visual-embeddings
      dockerfile: Dockerfile
    container_name: trix-local-visual-embeddings
    environment:
      SIGLIP_MODEL: google/siglip-base-patch16-224
      DEVICE: cpu
      MAX_BATCH_SIZE: 8
      PORT: 8080
    ports:
      - "${TRIX_PORT_VISUAL:-18090}:8080"
    volumes:
      - huggingface_cache:/home/appuser/.cache/huggingface
    networks:
      - trix
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    restart: unless-stopped
    profiles:
      - visual

# =============================================================================
# Networks & Volumes
# =============================================================================

networks:
  trix:
    name: trix-local
    driver: bridge

volumes:
  postgres_data:
    name: trix-local-postgres
  valkey_data:
    name: trix-local-valkey
  minio_data:
    name: trix-local-minio
  memgraph_data:
    name: trix-local-memgraph
  memgraph_log:
    name: trix-local-memgraph-log
  api_uploads:
    name: trix-local-uploads
  huggingface_cache:
    name: trix-local-hf-cache
