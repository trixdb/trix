version: '3.9'

services:
  # =============================================================================
  # PostgreSQL 17 with pgvector extension
  # =============================================================================
  postgres:
    image: pgvector/pgvector:pg17
    container_name: trixdb-postgres
    environment:
      POSTGRES_USER: trix
      POSTGRES_PASSWORD: trix_secret
      POSTGRES_DB: trix
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./trixdb/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - trixdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trix -d trix"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # =============================================================================
  # Valkey/Redis - for job queues and caching
  # =============================================================================
  redis:
    image: valkey/valkey:7-alpine
    container_name: trixdb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trixdb
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    command: >
      valkey-server
      --save 60 1000
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
      --timeout 0

  # =============================================================================
  # MinIO - S3-compatible storage for audio files and attachments
  # =============================================================================
  minio:
    image: minio/minio:latest
    container_name: trixdb-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    networks:
      - trixdb
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    command: server /data --console-address ":9001"

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: trixdb-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - trixdb
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing minio/trix-audio;
      mc anonymous set download minio/trix-audio;
      exit 0;
      "

  # =============================================================================
  # TrixDB API - Main Node.js application
  # =============================================================================
  trixdb:
    build:
      context: ./trixdb
      dockerfile: Dockerfile
      target: production
    container_name: trixdb-api
    env_file:
      - ./trixdb/.env
    environment:
      # Override with container-specific values
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3737
      DATABASE_URL: postgres://trix:trix_secret@postgres:5432/trix
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin123
      S3_BUCKET: trix-audio
      S3_REGION: auto
      S3_PUBLIC_URL: http://localhost:9000/trix-audio
    ports:
      - "3737:3737"
    volumes:
      # Optional: Mount source for development
      # - ./trixdb/src:/app/src:ro
      - trixdb_uploads:/app/uploads
    networks:
      - trixdb
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3737/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # =============================================================================
  # TrixDB Workers - Node.js background job processors
  # =============================================================================
  trixdb-workers-node:
    build:
      context: ./trixdb-workers-node
      dockerfile: Dockerfile
      target: production
    container_name: trixdb-workers-node
    env_file:
      - ./trixdb-workers-node/.env
    environment:
      # Override with container-specific values
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://trix:trix_secret@postgres:5432/trix
      HEALTH_PORT: 9091
      HEALTH_HOST: 0.0.0.0
      LOG_LEVEL: info
    ports:
      - "9091:9091"  # Health check endpoint
    networks:
      - trixdb
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      trixdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # =============================================================================
  # TrixDB Workers - Python background processors for ML tasks
  # =============================================================================
  trixdb-workers:
    build:
      context: ./trixdb-workers
      dockerfile: Dockerfile
      target: production
    container_name: trixdb-workers-python
    env_file:
      - ./trixdb-workers/.env
    environment:
      # Override with container-specific values
      TRIXDB_DATABASE_URL: postgresql://trix:trix_secret@postgres:5432/trix
      TRIXDB_LOG_LEVEL: INFO
      TRIXDB_LOG_FORMAT: json
      TRIXDB_METRICS_ENABLED: "true"
      TRIXDB_METRICS_PORT: 9090
    ports:
      - "9090:9090"  # Metrics/health endpoint
    networks:
      - trixdb
    depends_on:
      postgres:
        condition: service_healthy
      trixdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

# =============================================================================
# Networks
# =============================================================================
networks:
  trixdb:
    name: trixdb-network
    driver: bridge

# =============================================================================
# Volumes - Named volumes for data persistence
# =============================================================================
volumes:
  postgres_data:
    name: trixdb-postgres-data
  redis_data:
    name: trixdb-redis-data
  minio_data:
    name: trixdb-minio-data
  trixdb_uploads:
    name: trixdb-uploads
